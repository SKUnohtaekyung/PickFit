name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - feature/**
      - codex/**

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run secret scan
        run: npm run security:scan
